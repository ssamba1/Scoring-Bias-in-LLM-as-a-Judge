name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-report=term

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linters
        run: pip install flake8 black
      - name: Run flake8
        run: |
          flake8 results_rootcause/*.py tests/*.py pipeline_rootcause/*.py \
            --max-line-length=100 --count --statistics
      - name: Run black (check mode)
        run: |
          black --check --diff results_rootcause/*.py tests/*.py pipeline_rootcause/*.py

  paper-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended
      - name: Compile paper
        run: |
          cd paper
          pdflatex -interaction=nonstopmode camera_ready_full.tex 2>&1 | tail -20 || true
          echo "=== Second pass ==="
          pdflatex -interaction=nonstopmode camera_ready_full.tex 2>&1 | tail -20 || true
      - name: Report compilation status
        run: |
          if [ -f paper/camera_ready_full.pdf ]; then
            echo "✅ Paper compilation succeeded (PDF generated)"
          else
            echo "⚠️ Paper compilation did not produce a PDF (LaTeX may have errors)"
          fi

  figures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install matplotlib numpy pandas seaborn
      - name: Verify figures can be regenerated
        run: python paper/figures/generate_all_figures.py --check

  data-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run data validation
        run: python results_rootcause/validation/run_all_validation.py

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit on all files
        run: pre-commit run --all-files

  paper-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check paper structure
        run: |
          echo "=== Verifying paper directory structure ==="
          test -f paper/camera_ready_full.tex && echo "✓ Main paper exists"
          test -f paper/generate_png_figures.py && echo "✓ Figure generator exists"
          test -f paper/arxiv_package.py && echo "✓ arXiv packager exists"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t scoring-bias .
      - name: Verify image builds
        run: docker run --rm scoring-bias python -c "import transformers; print('✓ Transformers', transformers.__version__)"
