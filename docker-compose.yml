version: '3.8'

services:
  # Service 1: Run tests
  test:
    build: .
    container_name: bias-test
    command: ["python", "-m", "pytest", "tests/", "-x", "-v", "--tb=short"]
    networks:
      - bias-net

  # Service 2: Jupyter notebook server
  jupyter:
    build: .
    container_name: bias-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./results:/app/results
      - ./notebooks:/app/notebooks
      - ./data:/app/data
    command: ["jupyter", "notebook", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root"]
    restart: unless-stopped
    networks:
      - bias-net

  # Service 3: Streamlit dashboard
  dashboard:
    build: .
    container_name: bias-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app/dashboard
      - ./data:/app/data
      - ./results:/app/results
    command: ["streamlit", "run", "dashboard.py", "--server.port=8501", "--server.address=0.0.0.0"]
    restart: unless-stopped
    networks:
      - bias-net

  # Service 4: Static docs site via nginx
  website:
    image: nginx:alpine
    container_name: bias-website
    ports:
      - "8080:80"
    volumes:
      - ./docs:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - bias-net

networks:
  bias-net:
    driver: bridge
