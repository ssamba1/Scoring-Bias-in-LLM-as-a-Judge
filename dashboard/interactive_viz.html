<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bias Interaction Explorer  Interactive Visualization</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
h1 { font-size: 1.8rem; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
.subtitle { color: #94a3b8; margin-bottom: 30px; }
.controls { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.controls label { color: #94a3b8; font-size: 0.9rem; }
.controls select, .controls button { background: #334155; color: #e2e8f0; border: 1px solid #475569; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
.controls select:hover, .controls button:hover { background: #475569; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
.card h2 { font-size: 1rem; color: #93c5fd; margin-bottom: 15px; }
.card-full { grid-column: 1 / -1; }
.chart-container { position: relative; width: 100%; height: 350px; }
.chart-container svg { width: 100%; height: 100%; }
.tooltip { position: absolute; background: #0f172a; border: 1px solid #475569; padding: 10px; border-radius: 6px; pointer-events: none; font-size: 0.85rem; opacity: 0; transition: opacity 0.2s; }
.axis text { fill: #94a3b8; font-size: 11px; }
.axis line, .axis path { stroke: #334155; }
.legend { display: flex; gap: 20px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: #94a3b8; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; }
.interactive-note { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #475569; font-size: 0.9rem; text-align: center; pointer-events: none; }
</style>
</head>
<body>
<div class="container">
  <h1>Bias Interaction Explorer</h1>
  <p class="subtitle">Interactive visualization of LLM-as-a-Judge bias interaction effects</p>

  <div class="controls">
    <label>Metric:</label>
    <select id="metric-select">
      <option value="ir">Interaction Ratio</option>
      <option value="degradation">Worst-Case Degradation</option>
      <option value="pos">Position Bias</option>
      <option value="verb">Verbosity Bias</option>
      <option value="sent">Sentiment Bias</option>
    </select>
    <label>View:</label>
    <select id="view-select">
      <option value="bar">Bar Chart</option>
      <option value="radar">Radar Chart</option>
      <option value="heatmap">Heatmap</option>
      <option value="scatter">Scatter Plot</option>
    </select>
    <button onclick="updateVisualization()">Update</button>
    <button onclick="resetView()">Reset</button>
  </div>

  <div class="grid">
    <div class="card card-full">
      <h2>Main Visualization</h2>
      <div class="chart-container" id="main-chart">
        <div class="interactive-note">Loading visualization...</div>
      </div>
      <div id="legend-container" class="legend"></div>
    </div>
  </div>

  <div class="grid" style="margin-top:20px">
    <div class="card">
      <h2>Judge Comparison</h2>
      <div class="chart-container" id="judge-chart">
        <div class="interactive-note">Select judges to compare</div>
      </div>
    </div>
    <div class="card">
      <h2>Interaction Matrix</h2>
      <div class="chart-container" id="matrix-chart">
        <div class="interactive-note">Bias interaction patterns</div>
      </div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const JUDGE_COLORS = { claude: '#4C72B0', gpt4o: '#DD8452', gemini: '#55A868', deepseek: '#C44E52', llama: '#8172B2' };
const JUDGE_NAMES = ['claude', 'gpt4o', 'gemini', 'deepseek', 'llama'];

// Data from our synthetic experiments
const BIAS_DATA = {
  claude: { ir: 1.72, degradation: 0.37, pos: 0.12, verb: 0.08, sent: 0.10, baseline: 3.50, worst: 3.12 },
  gpt4o: { ir: 1.53, degradation: 0.34, pos: 0.08, verb: 0.04, sent: 0.12, baseline: 3.48, worst: 3.14 },
  gemini: { ir: 0.99, degradation: 0.53, pos: 0.16, verb: 0.15, sent: 0.18, baseline: 3.51, worst: 2.97 },
  deepseek: { ir: 1.54, degradation: 0.32, pos: 0.02, verb: 0.10, sent: 0.08, baseline: 3.49, worst: 3.17 },
  llama: { ir: 2.10, degradation: 0.71, pos: 0.20, verb: 0.22, sent: 0.15, baseline: 3.51, worst: 2.80 }
};

const width = 700, height = 300;
const margin = { top: 20, right: 80, bottom: 50, left: 60 };

function getMetricValues(metric) {
  const keyMap = { ir: 'ir', degradation: 'degradation', pos: 'pos', verb: 'verb', sent: 'sent' };
  const k = keyMap[metric] || 'ir';
  return JUDGE_NAMES.map(j => ({ judge: j, value: BIAS_DATA[j][k], color: JUDGE_COLORS[j] }));
}

function renderBarChart(selector, data, title, yLabel, thresholdLine) {
  const svg = d3.select(selector);
  svg.selectAll('*').remove();

  const w = 700, h = 300;
  const m = { top: 20, right: 20, bottom: 50, left: 60 };
  const innerW = w - m.left - m.right;
  const innerH = h - m.top - m.bottom;

  const g = svg.append('g').attr('transform', `translate(${m.left},${m.top})`);

  const x = d3.scaleBand().domain(data.map(d => d.judge)).range([0, innerW]).padding(0.3);
  const y = d3.scaleLinear().domain([0, d3.max(data, d => Math.abs(d.value)) * 1.2]).range([innerH, 0]);

  // Grid lines
  g.append('g').attr('class', 'y axis')
    .call(d3.axisLeft(y).ticks(5).tickFormat(d3.format('.1f')))
    .selectAll('line').attr('stroke', '#334155').attr('stroke-dasharray', '3,3');

  g.append('g').attr('class', 'x axis')
    .attr('transform', `translate(0,${innerH})`)
    .call(d3.axisBottom(x))
    .selectAll('text').attr('fill', '#94a3b8');

  // Threshold line
  if (thresholdLine !== undefined) {
    g.append('line')
      .attr('x1', 0).attr('x2', innerW)
      .attr('y1', y(thresholdLine)).attr('y2', y(thresholdLine))
      .attr('stroke', thresholdLine === 1.0 ? '#f87171' : '#fbbf24')
      .attr('stroke-width', 2).attr('stroke-dasharray', '5,5');
    g.append('text')
      .attr('x', innerW - 5).attr('y', y(thresholdLine) - 5)
      .attr('text-anchor', 'end').attr('fill', thresholdLine === 1.0 ? '#f87171' : '#fbbf24')
      .attr('font-size', '11px')
      .text(thresholdLine === 1.0 ? 'Additive (IR=1)' : '');
  }

  // Bars
  g.selectAll('.bar')
    .data(data).enter().append('rect')
    .attr('class', 'bar')
    .attr('x', d => x(d.judge))
    .attr('y', d => y(Math.max(0, d.value)))
    .attr('width', x.bandwidth())
    .attr('height', d => Math.abs(y(0) - y(Math.abs(d.value))))
    .attr('fill', d => d.color)
    .attr('opacity', 0.85)
    .attr('rx', 4)
    .on('mouseover', function(event, d) {
      d3.select(this).attr('opacity', 1);
      const tooltip = d3.select('#tooltip');
      tooltip.style('opacity', 1)
        .html(`<strong>${d.judge}</strong><br>Value: ${d.value.toFixed(3)}`)
        .style('left', (event.pageX + 10) + 'px')
        .style('top', (event.pageY - 20) + 'px');
    })
    .on('mouseout', function() {
      d3.select(this).attr('opacity', 0.85);
      d3.select('#tooltip').style('opacity', 0);
    });

  // Value labels
  g.selectAll('.label')
    .data(data).enter().append('text')
    .attr('x', d => x(d.judge) + x.bandwidth() / 2)
    .attr('y', d => y(Math.abs(d.value)) - 8)
    .attr('text-anchor', 'middle')
    .attr('fill', '#e2e8f0')
    .attr('font-size', '12px')
    .attr('font-weight', 'bold')
    .text(d => d.value.toFixed(2));
}

function renderRadarChart(selector) {
  const svg = d3.select(selector);
  svg.selectAll('*').remove();

  const w = 600, h = 400, cx = w / 2, cy = h / 2, radius = 150;
  const metrics = ['ir', 'degradation', 'pos', 'verb', 'sent'];
  const metricLabels = { ir: 'Interaction Ratio', degradation: 'Worst Degradation', pos: 'Position Bias', verb: 'Verbosity Bias', sent: 'Sentiment Bias' };

  const g = svg.append('g').attr('transform', `translate(${cx},${cy})`);

  // Scale each metric to 0-1
  function scaleMetric(metric) {
    const vals = JUDGE_NAMES.map(j => BIAS_DATA[j][metric]);
    const mx = Math.max(...vals) || 1;
    return j => BIAS_DATA[j][metric] / mx;
  }

  // Draw axes
  const angleSlice = Math.PI * 2 / metrics.length;
  metrics.forEach((m, i) => {
    const angle = angleSlice * i - Math.PI / 2;
    const line = g.append('line')
      .attr('x1', 0).attr('y1', 0)
      .attr('x2', Math.cos(angle) * radius)
      .attr('y2', Math.sin(angle) * radius)
      .attr('stroke', '#334155').attr('stroke-width', 1);
    g.append('text')
      .attr('x', Math.cos(angle) * (radius + 20))
      .attr('y', Math.sin(angle) * (radius + 20))
      .attr('text-anchor', 'middle').attr('fill', '#94a3b8')
      .attr('font-size', '10px')
      .text(metricLabels[m]);
  });

  // Draw concentric rings
  [0.25, 0.5, 0.75, 1.0].forEach((v, i) => {
    g.append('circle')
      .attr('r', radius * v).attr('fill', 'none')
      .attr('stroke', '#1e293b').attr('stroke-width', 0.5);
  });

  // Draw data for each judge
  JUDGE_NAMES.forEach(j => {
    const values = metrics.map(m => scaleMetric(m)(j));
    const points = values.map((v, i) => {
      const angle = angleSlice * i - Math.PI / 2;
      return [Math.cos(angle) * radius * v, Math.sin(angle) * radius * v];
    });

    // Path
    g.append('polygon')
      .attr('points', points.map(p => p.join(',')).join(' '))
      .attr('fill', JUDGE_COLORS[j]).attr('fill-opacity', 0.1)
      .attr('stroke', JUDGE_COLORS[j]).attr('stroke-width', 2);

    // Points
    points.forEach((p, i) => {
      g.append('circle')
        .attr('cx', p[0]).attr('cy', p[1])
        .attr('r', 4).attr('fill', JUDGE_COLORS[j]);
    });
  });
}

function renderHeatmap(selector) {
  const svg = d3.select(selector);
  svg.selectAll('*').remove();

  const w = 500, h = 350;
  const g = svg.append('g').attr('transform', 'translate(60,30)');

  // Build interaction matrix
  const interactions = {};
  JUDGE_NAMES.forEach(j => {
    const d = BIAS_DATA[j];
    interactions[j] = { 'Position×Verb': d.ir, 'Pos+Verb+Sent': d.degradation / 0.5 };
  });

  const factors = ['Position×Verb', 'Pos+Verb+Sent'];
  const cellW = (w - 60) / factors.length;
  const cellH = (h - 30) / JUDGE_NAMES.length;

  // Color scale
  const allVals = JUDGE_NAMES.flatMap(j => factors.map(f => interactions[j][f]));
  const colorScale = d3.scaleSequential(d3.interpolateReds)
    .domain([0, d3.max(allVals)]);

  // Cells
  JUDGE_NAMES.forEach((j, i) => {
    factors.forEach((f, k) => {
      const v = interactions[j][f];
      g.append('rect')
        .attr('x', k * cellW).attr('y', i * cellH)
        .attr('width', cellW - 2).attr('height', cellH - 2)
        .attr('fill', colorScale(v)).attr('rx', 4);
      g.append('text')
        .attr('x', k * cellW + cellW / 2).attr('y', i * cellH + cellH / 2)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
        .attr('fill', v > 0.5 ? '#fff' : '#e2e8f0').attr('font-size', '12px')
        .text(v.toFixed(2));
    });
  });

  // Labels
  JUDGE_NAMES.forEach((j, i) => {
    g.append('text')
      .attr('x', -8).attr('y', i * cellH + cellH / 2)
      .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
      .attr('fill', '#94a3b8').attr('font-size', '11px').text(j);
  });
  factors.forEach((f, k) => {
    g.append('text')
      .attr('x', k * cellW + cellW / 2).attr('y', -10)
      .attr('text-anchor', 'middle').attr('fill', '#94a3b8')
      .attr('font-size', '11px').text(f);
  });
}

function renderScatterPlot(selector) {
  const svg = d3.select(selector);
  svg.selectAll('*').remove();

  const w = 700, h = 300, m = { top: 20, right: 20, bottom: 50, left: 60 };
  const g = svg.append('g').attr('transform', `translate(${m.left},${m.top})`);
  const innerW = w - m.left - m.right;
  const innerH = h - m.top - m.bottom;

  // Position bias vs verbosity bias
  const data = JUDGE_NAMES.map(j => ({
    judge: j, x: BIAS_DATA[j].pos, y: BIAS_DATA[j].verb,
    deg: BIAS_DATA[j].degradation, color: JUDGE_COLORS[j]
  }));

  const xScale = d3.scaleLinear().domain([0, d3.max(data, d => d.x) * 1.2]).range([0, innerW]);
  const yScale = d3.scaleLinear().domain([0, d3.max(data, d => d.y) * 1.2]).range([innerH, 0]);

  g.append('g').attr('class', 'x axis')
    .attr('transform', `translate(0,${innerH})`)
    .call(d3.axisBottom(xScale).ticks(5))
    .selectAll('text').attr('fill', '#94a3b8');
  g.append('g').attr('class', 'y axis')
    .call(d3.axisLeft(yScale).ticks(5))
    .selectAll('text').attr('fill', '#94a3b8');

  // Labels
  g.append('text').attr('x', innerW/2).attr('y', innerH+35)
    .attr('text-anchor', 'middle').attr('fill', '#94a3b8').attr('font-size', '11px')
    .text('Position Bias Magnitude');
  g.append('text').attr('x', -35).attr('y', innerH/2)
    .attr('transform', 'rotate(-90)').attr('text-anchor', 'middle')
    .attr('fill', '#94a3b8').attr('font-size', '11px')
    .text('Verbosity Bias Magnitude');

  // Points
  data.forEach(d => {
    g.append('circle')
      .attr('cx', xScale(d.x)).attr('cy', yScale(d.y))
      .attr('r', 8 + d.deg * 12).attr('fill', d.color)
      .attr('opacity', 0.8).attr('stroke', '#fff').attr('stroke-width', 1.5)
      .on('mouseover', function(event) {
        d3.select(this).attr('opacity', 1).attr('r', 12);
        d3.select('#tooltip').style('opacity', 1)
          .html(`<strong>${d.judge}</strong><br>Pos: ${d.x.toFixed(3)}<br>Verb: ${d.y.toFixed(3)}<br>Degradation: ${d.deg.toFixed(3)}`)
          .style('left', (event.pageX + 10) + 'px').style('top', (event.pageY - 20) + 'px');
      })
      .on('mouseout', function() {
        d3.select(this).attr('opacity', 0.8).attr('r', 8 + d.deg * 12);
        d3.select('#tooltip').style('opacity', 0);
      });
    g.append('text')
      .attr('x', xScale(d.x)).attr('y', yScale(d.y) - 12)
      .attr('text-anchor', 'middle').attr('fill', '#e2e8f0')
      .attr('font-size', '10px').text(d.judge);
  });
}

function updateVisualization() {
  const metric = document.getElementById('metric-select').value;
  const view = document.getElementById('view-select').value;
  const data = getMetricValues(metric);

  document.getElementById('main-chart').innerHTML = '<svg width="700" height="300"></svg>';
  const svg = document.querySelector('#main-chart svg');
  if (!svg) return;

  if (view === 'bar') {
    renderBarChart(svg, data, metric, metric, metric === 'ir' ? 1.0 : undefined);
  } else if (view === 'radar') {
    svg.setAttribute('width', '600'); svg.setAttribute('height', '400');
    renderRadarChart(svg);
  } else if (view === 'heatmap') {
    svg.setAttribute('width', '500'); svg.setAttribute('height', '350');
    renderHeatmap(svg);
  } else if (view === 'scatter') {
    svg.setAttribute('width', '700'); svg.setAttribute('height', '300');
    renderScatterPlot(svg);
  }
}

function resetView() {
  document.getElementById('metric-select').value = 'ir';
  document.getElementById('view-select').value = 'bar';
  updateVisualization();
}

// Render judge comparison and matrix
function renderJudgeComparison() {
  const svg = d3.select('#judge-chart').append('svg').attr('width', '600').attr('height', '300');
  const data = JUDGE_NAMES.map(j => ({ judge: j, baseline: BIAS_DATA[j].baseline, worst: BIAS_DATA[j].worst, color: JUDGE_COLORS[j] }));

  const m = { top: 20, right: 20, bottom: 50, left: 50 };
  const g = svg.append('g').attr('transform', `translate(${m.left},${m.top})`);
  const w = 500, h = 230;
  const x = d3.scaleBand().domain(JUDGE_NAMES).range([0, w]).padding(0.3);
  const y = d3.scaleLinear().domain([2.5, 4.0]).range([h, 0]);

  // Baseline bars
  g.selectAll('.base-bar').data(data).enter().append('rect')
    .attr('x', d => x(d.judge) - x.bandwidth() * 0.3)
    .attr('y', d => y(d.baseline)).attr('width', x.bandwidth() * 0.5)
    .attr('height', d => h - y(d.baseline))
    .attr('fill', d => d.color).attr('opacity', 0.6).attr('rx', 3);

  // Worst bars
  g.selectAll('.worst-bar').data(data).enter().append('rect')
    .attr('x', d => x(d.judge) + x.bandwidth() * 0.1)
    .attr('y', d => y(d.worst)).attr('width', x.bandwidth() * 0.5)
    .attr('height', d => h - y(d.worst))
    .attr('fill', d => d.color).attr('opacity', 1).attr('rx', 3);

  g.append('g').call(d3.axisLeft(y).tickFormat(d3.format('.1f')));
  g.append('g').attr('transform', `translate(0,${h})`).call(d3.axisBottom(x));
}

function renderInteractionMatrix() {
  const svg = d3.select('#matrix-chart').append('svg').attr('width', '500').attr('height', '300');
  const g = svg.append('g').attr('transform', 'translate(50,20)');

  JUDGE_NAMES.forEach((j1, i) => {
    JUDGE_NAMES.forEach((j2, k) => {
      const diff = Math.abs(BIAS_DATA[j1].ir - BIAS_DATA[j2].ir);
      const maxDiff = 1.5;
      const intensity = Math.min(diff / maxDiff, 1);
      const color = d3.interpolateBuGn(1 - intensity);

      g.append('rect')
        .attr('x', k * 90).attr('y', i * 55)
        .attr('width', 85).attr('height', 50)
        .attr('fill', color).attr('rx', 4)
        .attr('stroke', '#334155').attr('stroke-width', 1);

      g.append('text')
        .attr('x', k * 90 + 42).attr('y', i * 55 + 25)
        .attr('text-anchor', 'middle').attr('fill', '#0f172a')
        .attr('font-size', '11px')
        .text(`${j1} × ${j2}`);
      g.append('text')
        .attr('x', k * 90 + 42).attr('y', i * 55 + 40)
        .attr('text-anchor', 'middle').attr('fill', '#334155')
        .attr('font-size', '10px')
        .text(`ΔIR=${diff.toFixed(2)}`);
    });
  });
}

// Initialize
updateVisualization();
renderJudgeComparison();
renderInteractionMatrix();
</script>
</body>
</html>
