<!DOCTYPE html>

<meta charset="UTF-8">

<title>Model Comparison  Side-by-Side Model Comparison</title>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d;

  --green: #3fb950; --yellow: #d29922; --red: #f85149;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5;
}
.container { max-width: 1200px; margin: 0 auto; }
h1 { font-size: 1.8em; margin-bottom: 4px; }
.subtitle { color: var(--text-dim); margin-bottom: 24px; font-size: 0.95em; }
.controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 24px; }
.controls label { font-weight: 600; font-size: 0.9em; color: var(--text-dim); }
.controls select {
  background: var(--card); color: var(--text); border: 1px solid var(--border);
  padding: 6px 10px; border-radius: 6px; font-size: 0.9em; min-width: 180px;
  cursor: pointer;
}
.controls select:focus { outline: none; border-color: var(--accent); }
.controls button {
  background: var(--accent); color: #fff; border: none; padding: 7px 16px;
  border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9em;
  transition: background 0.2s;
}
.controls button:hover { background: #79b8ff; }
.controls button.danger { background: #21262d; color: #f85149; border:1px solid #f85149; }
.controls button.danger:hover { background: rgba(248,81,73,0.15); }
.selected-models { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.model-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(88,166,255,0.12); color: var(--accent);
  padding: 4px 10px; border-radius: 16px; font-size: 0.85em; font-weight: 600;
}
.model-chip button {
  background: none; border: none; color: var(--accent); cursor: pointer;
  font-size: 1em; line-height: 1; padding: 0; opacity: 0.7;
}
.model-chip button:hover { opacity: 1; }
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 20px; margin-bottom: 20px;
}
.card h2 { font-size: 1.1em; margin-bottom: 16px; color: var(--accent); }
.chart-wrap { width: 100%; max-width: 800px; margin: 0 auto; }
.chart-wrap canvas { width: 100% !important; height: auto !important; }
.tab-bar { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
.tab-bar button {
  background: none; border: none; color: var(--text-dim); padding: 8px 16px;
  cursor: pointer; font-size: 0.9em; border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab-bar button:hover { color: var(--text); }
.tab-bar button.active { color: var(--accent); border-bottom-color: var(--accent); }
.table-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse; font-size: 0.9em;
}
th { background: rgba(255,255,255,0.05); padding: 10px 12px; text-align: left; font-weight: 600; white-space: nowrap; }
td { padding: 8px 12px; border-top: 1px solid var(--border); }
tr:hover { background: rgba(255,255,255,0.02); }
.diff-pos { color: var(--green); }
.diff-neg { color: var(--red); }
.diff-zero { color: var(--text-dim); }
.footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); text-align: center; }
.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>Model Comparison</h1>
  <p class="subtitle">Compare 2–4 models side-by-side across evaluation probes. Select from the dropdown below.</p>

  <div class="controls">
    <label for="modelAddSelect">Add model:</label>
    <select id="modelAddSelect"></select>
    <button onclick="addModel()">Add</button>
    <button class="danger" onclick="clearModels()">Clear All</button>
  </div>
  <div class="selected-models" id="selectedChips"></div>

  <div class="card">
    <div class="tab-bar">
      <button class="active" onclick="switchTab('bar')">Bar Chart</button>
      <button onclick="switchTab('diff')">Difference Table</button>
    </div>
    <div id="tabBar" class="chart-wrap">

    </div>
    <div id="tabDiff" style="display:none">
      <div class="table-wrap" id="diffTableWrap"></div>
    </div>
  </div>

  <div class="footer">
    <p>Supplementary material  <a href="index.html">Back to Interactive Hub</a></p>

// ─── STATE ─────────────────────────────────────────────────────────────────
let selected = [];
const COLORS = ['#58a6ff','#f0883e','#3fb950','#f85149','#d29922','#bc8cff','#79c0ff','#ffa657'];

// ─── INIT ─────────────────────────────────────────────────────────────────
(function init() {
  const sel = document.getElementById('modelAddSelect');
  ALL_NAMES.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n; opt.textContent = n;
    sel.appendChild(opt);
  });
  // default: select first 2 models
  if (ALL_NAMES.length >= 2) {
    selected = [ALL_NAMES[0], ALL_NAMES[1]];
    updateChips();
    drawBar();
    buildDiffTable();
  }
})();

function addModel() {
  const sel = document.getElementById('modelAddSelect');
  const name = sel.value;
  if (selected.includes(name)) return;
  if (selected.length >= 4) { alert('Maximum 4 models for comparison.'); return; }
  selected.push(name);
  updateChips(); drawBar(); buildDiffTable();
}

function removeModel(name) {
  selected = selected.filter(n => n !== name);
  updateChips(); drawBar(); buildDiffTable();
}

function clearModels() {
  selected = [];
  updateChips();
  const ctx = document.getElementById('barChart').getContext('2d');
  ctx.clearRect(0,0,900,450);
  document.getElementById('diffTableWrap').innerHTML = '';
}

function updateChips() {
  const div = document.getElementById('selectedChips');
  div.innerHTML = selected.map((n,i) =>
    `<span class="model-chip" style="background:${COLORS[i%8]}22;color:${COLORS[i%8]}">
      ${n} <button onclick="removeModel('${n}')">✕</button>
    </span>`
  ).join('');
  document.getElementById('modelAddSelect').value = ALL_NAMES.filter(n => !selected.includes(n))[0] || ALL_NAMES[0];
}

// ─── TAB SWITCHING ──────────────────────────────────────────────────────────
let currentTab = 'bar';
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.toggle('active', b.textContent.trim().toLowerCase().includes(tab)));
  document.getElementById('tabBar').style.display = tab === 'bar' ? '' : 'none';
  document.getElementById('tabDiff').style.display = tab === 'diff' ? '' : 'none';
  if (tab === 'bar') drawBar();
  else buildDiffTable();
}

// ─── BAR CHART ───────────────────────────────────────────────────────────────
function drawBar() {
  const canvas = document.getElementById('barChart');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pad = {top:30, bottom:60, left:60, right:30};
  ctx.clearRect(0,0,W,H);

  if (selected.length === 0) {
    ctx.fillStyle = '#8b949e';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Add models to compare', W/2, H/2);
    return;
  }

  const probes = ['rubric_order', 'score_id', 'reference_answer'];
  const probeLabels = ['Rubric Order', 'Score ID', 'Ref Answer'];
  const nModels = selected.length;
  const nProbes = probes.length;
  const nGroups = nProbes;
  const groupSpacing = 30;
  const barSpacing = 4;
  const totalBarW = (W - pad.left - pad.right - groupSpacing*(nGroups-1)) / nGroups;
  const barW = Math.min(totalBarW / nModels - barSpacing, 50);

  const chartW = pad.left + (totalBarW * nGroups) + groupSpacing*(nGroups-1) + pad.right*2;
  // adjust if needed

  // max score
  let maxVal = 5.5;

  // gridlines
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  for (let v = 0; v <= 5; v++) {
    const y = pad.top + (H - pad.top - pad.bottom) * (1 - v/maxVal);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y);
    ctx.stroke();
    ctx.fillStyle = '#8b949e'; ctx.font = '11px monospace';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(v.toFixed(1), pad.left - 8, y);
  }

  // bars
  for (let g = 0; g < nGroups; g++) {
    const probe = probes[g];
    const gx = pad.left + g * (totalBarW + groupSpacing) + (totalBarW - (nModels * barW + (nModels-1)*barSpacing))/2;
    for (let mi = 0; mi < nModels; mi++) {
      const m = selected[mi];
      const data = RAW_DATA[m];
      if (!data || !data[probe]) continue;
      const conds = Object.values(data[probe]);
      const avg = conds.reduce((a,b)=>a+b,0) / conds.length;
      const x = gx + mi * (barW + barSpacing);
      const barH = (H - pad.top - pad.bottom) * (avg / maxVal);
      const y = pad.top + (H - pad.top - pad.bottom) - barH;

      // rounded rect
      ctx.fillStyle = COLORS[mi % COLORS.length];
      ctx.beginPath();
      ctx.roundRect(x, y, barW, Math.max(barH,2), [3,3,0,0]);
      ctx.fill();

      // value on top
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText(avg.toFixed(1), x + barW/2, y - 3);
    }

    // group label
    ctx.fillStyle = '#c9d1d9';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(probeLabels[g], gx + nModels * (barW + barSpacing) / 2, pad.top + (H - pad.top - pad.bottom) + 8);
  }

  // legend
  const lx = pad.left + 20;
  const ly = 8;
  selected.forEach((n,i) => {
    const rx = lx + i * 160;
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fillRect(rx, ly, 14, 14);
    ctx.fillStyle = '#c9d1d9';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(n.length > 22 ? n.slice(0,20)+'…' : n, rx + 20, ly + 7);
  });
}

// ─── DIFFERENCE TABLE ───────────────────────────────────────────────────────
function buildDiffTable() {
  const wrap = document.getElementById('diffTableWrap');
  if (selected.length < 2) {
    wrap.innerHTML = '<p style="color:var(--text-dim);padding:20px">Select at least 2 models to see differences.</p>';
    return;
  }

  const probes = ['rubric_order', 'score_id', 'reference_answer'];
  const probeLabels = ['Rubric Order', 'Score ID', 'Ref Answer'];
  const condLabels = {
    rubric_order: ['normal','reversed'],
    score_id: ['numeric','letter','descriptive'],
    reference_answer: ['no_ref','good_ref','poor_ref']
  };

  let html = '<h3 style="margin-bottom:12px">Pairwise Δ Differences</h3><table><thead><tr><th>Probe</th><th>Condition</th>';
  for (let i = 0; i < selected.length; i++) {
    for (let j = i+1; j < selected.length; j++) {
      html += `<th>${selected[i]} − ${selected[j]}</th>`;
    }
  }
  html += '</tr></thead><tbody>';

  probes.forEach(probe => {
    const conds = condLabels[probe];
    conds.forEach((cond, ci) => {
      html += '<tr>';
      if (ci === 0) html += `<td rowspan="${conds.length}" style="font-weight:600;vertical-align:top">${probeLabels[probes.indexOf(probe)]}</td>`;
      html += `<td>${cond}</td>`;
      for (let i = 0; i < selected.length; i++) {
        for (let j = i+1; j < selected.length; j++) {
          const vi = RAW_DATA[selected[i]]?.[probe]?.[cond] ?? 0;
          const vj = RAW_DATA[selected[j]]?.[probe]?.[cond] ?? 0;
          const diff = vi - vj;
          let cls = 'diff-zero';
          if (diff > 0.05) cls = 'diff-pos';
          else if (diff < -0.05) cls = 'diff-neg';
          html += `<td class="${cls}" style="font-family:monospace;font-weight:600;text-align:center">${diff >= 0 ? '+' : ''}${diff.toFixed(2)}</td>`;
        }
      }
      html += '</tr>';
    });
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

// roundRect polyfill for canvas
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
    const r = Array.isArray(radii) ? radii : [radii,radii,radii,radii];
    const [tl, tr, br, bl] = r.map(rr => Math.min(rr || 0, Math.min(w,h)/2));
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
    return this;
  };
}
