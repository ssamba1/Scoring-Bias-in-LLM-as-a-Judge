abstract: |
  LLMs are increasingly deployed as automated judges in the LLM-as-a-Judge paradigm, yet they exhibit systematic scoring biases that compromise evaluation reliability. Li et al. documented three scoring bias types across five frontier models, but explicitly noted that "the underlying causes of these scoring biases remain to be validated." We present the first systematic investigation of whether scoring bias originates from pre-training or emerges during instruction tuning. Through controlled experiments spanning 3 model families (Llama 3 8B, Mistral 7B, Gemma 2 2B) with 6 total variants (base + instruct each) across 3 scoring bias probes and 3 variants per probe totaling 8,100 judgments on a free GPU, we find that instruction tuning has differential effects: format-related biases (rubric order, score ID) decrease by 44% and 77% respectively, while content-related bias (reference answer) increases by 35%. This pattern is consistent across all three families. Our flip rates are consistent with Li et al. (25-48%), validating our methodology.
comments: "8 pages, 3 tables, 8 figures. Submitted to NeurIPS 2026 High School Projects Track."
