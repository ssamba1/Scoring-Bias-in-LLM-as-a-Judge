title: "Scoring Bias in LLM-as-a-Judge Models: A 22-Model Landscape with Base-Instruct Comparison"
authors:
  - name: "Sricharan Samba"
primary_class: "cs.CL"
secondary_classes: ["cs.AI", "cs.LG", "stat.ML"]
license: "http://arxiv.org/licenses/nonexclusive-distrib/1.0/"
abstract: |
  LLMs deployed as automated judges exhibit systematic scoring biases, but whether these originate from pre-training or instruction tuning is unknown. We measure scoring bias across 22 instruct-tuned models (29,700 judgments) and compare base vs instruct variants across 9 families (24,300 judgments) using 3 perturbation probes. Score ID bias has the largest average effect (Delta=0.68) across instruct models. Instruction tuning reduces format bias but may increase content bias for RLHF families. The single SFT+DPO family shows a different pattern. Four alternative explanations are examined. Scoring bias is modulated by instruction tuning, not inherent to pre-training. A mechanistic framework (IIAR hypothesis) with five testable predictions is proposed, alongside the Format Efficiency Hypothesis supported by attention-weight evidence showing format token attention decreasing from 23.7% to 20.8%.
comments: "20 pages, 8 tables, 20 figures. Code and data: https://github.com/ssamba1/Scoring-Bias-in-LLM-as-a-Judge"
